on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          prompt_file: .github/prompts/issue-triage.md
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
